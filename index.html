<html>
  <meta charset="UTF-8">

  <head>
    <style>
      midi-visualizer .piano-roll-visualizer {
        display: block;
        width: inherit;
        overflow: auto;
      }
      midi-visualizer .piano-roll-visualizer svg rect.note {
        opacity: calc(min(1, (var(--midi-velocity) + 30) / 128) * 0.75); }
      midi-visualizer .piano-roll-visualizer svg rect.note.active {
          opacity: calc(min(1, (var(--midi-velocity) + 30) / 128) * 0.9);
          stroke: black;
          stroke-width: 0.75;
          stroke-opacity: 0.75; }
      midi-visualizer svg rect.note[data-instrument="0"]{ fill: #0062cc; }
      midi-visualizer svg rect.note[data-instrument="1"]{ fill: #00b680; }
      midi-visualizer svg rect.note[data-instrument="2"]{ fill: #de0015; }
      midi-visualizer svg rect.note[data-instrument="3"]{ fill: #4f00cf; }
    </style>
    <script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/focus-visible@5,npm/html-midi-player@1.4.0"></script>
  </head>

<body>
